name: Backend CI

on:
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "global.json"
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-ci.yml"
      - "global.json"

jobs:
  build:
    name: Build and test backend
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Restore
        run: dotnet restore backend/Spendly.sln

      - name: Build
        run: dotnet build backend/Spendly.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test backend/Spendly.sln --configuration Release --no-build
